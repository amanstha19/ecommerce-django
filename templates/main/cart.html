<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css">
    <title>UpaharNepal </title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
        }

        .header {
            background-color: #111;
            padding: 10px;
            text-align: center;
            color: white;
        }

        .dashboard-container {
            display: grid;
            grid-template-columns: 250px auto;
            height: calc(100vh - 40px); /* Adjust for header height */
        }

        .sidebar {
            background-color: #f3e9dd;
            padding-top: 20px;
        }

        .sidebar a {
            padding: 15px 10px;
            text-decoration: none;
            font-size: 18px;
            color: #818181;
            display: block;
        }

        .sidebar a:hover {
            color: #f1f1f1;
        }

        .content {
            padding: 16px;
            overflow-y: auto; /* Add scrollbar if content overflows */
        }

        .product-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .product-box {
            text-align: center;
            border: 1px solid #ddd;
            padding: 20px;
            margin-bottom: 20px;
        }
        .product-box img{
            max-height: 200px;
        }
        .product-image {
            max-width: 100%;
            height: auto;
        }

        .product-name {
            margin-top: 10px;
            font-weight: bold;
        }

        .stars {
            color: gold;
        }

        .price {
            margin-top: 10px;
            font-size: 18px;
        }
        .search-button{
            border: #413d3d solid 0.5px;
            border-radius: 9px;
            margin-left: 3px;
        }
        .search-button:hover{
            background-color: rgb(202, 194, 194);
    
        }
        .sidebar a:hover .dash {
            color: black; 
        }
        .sidebar a:hover {
            color: black;
        }

    </style>
</head>

<body>

    <section>
        <nav class="navbar bg-body-tertiary" style="background-color:#f3e9dd ; border-bottom: 0.1px solid;">
            <div class="container-fluid">
                <a class="navbar-brand">UpaharNepal</a>
                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
                    <button class="search-button" type="submit">Search</button>
                </form>
            </div>
        </nav>
    </section>
    <section>
        <div class="dashboard-container">
            <div class="sidebar">
                <a href="./home.html">
                    <i class="fas fa-home dash"></i> Home
                </a>
                <a href="./pricing.html">
                    <i class="fas fa-dollar-sign dash"></i> Pricing
                </a>
                <a href="./cart.html">
                    <i class="fas fa-shopping-cart dash"></i> Cart
                </a>
                <a href="#">
                    <i class="fas fa-birthday-cake dash"></i> Occasions
                </a>
            </div>

            <div class="cart-section">
                <h2>Added Products</h2>
                <ul class="added-products">
                    <li>Product 1 - Rs 2500</li>
                    <li>Product 2 - Rs 2000</li>
                    <!-- Add more products dynamically as needed -->
                </ul>

                <div class="select-date">
                    <label for="deliveryDate">Select Delivery Date:</label>
                    <input type="date" id="deliveryDate" name="deliveryDate">
                </div>

                <button class="continue-shopping">Continue Shopping</button>
                <button class="proceed-to-checkout">Proceed to Checkout</button>
            </div>
        </div>
    </section>
    <style>
        .cart-section {
            margin-top: 20px;
            background-image: url('path/to/your/image.jpg'); /* Add your image path here */
            background-size: cover;
            background-position: center;
            color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }
    
        .added-products {
            list-style: none;
            padding: 0;
            margin-bottom: 20px;
        }
    
        .added-products li {
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 10px;
            margin-bottom: 10px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
        }
    
        .select-date {
            margin-bottom: 20px;
        }
    
        .select-date label {
            display: block;
            margin-bottom: 5px;
        }
    
        .select-date input {
            padding: 8px;
            border: none;
            border-radius: 5px;
        }
    
        .continue-shopping,
        .proceed-to-checkout {
            padding: 10px;
            background-color: orange;
            border: 1px solid #ddd;
            color: white;
            cursor: pointer;
            margin-right: 10px;
            border-radius: 5px;
        }
    
        .continue-shopping:hover,
        .proceed-to-checkout:hover {
            background-color: darkorange;
        }
    </style>
    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
</body>

</html>
