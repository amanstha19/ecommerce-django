<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css">
    <title>UpaharNepal</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
        }

        .header {
            background-color: #111;
            padding: 10px;
            text-align: center;
            color: white;
        }

        .dashboard-container {
            display: grid;
            grid-template-columns: 250px auto;
            height: calc(100vh - 40px); /* Adjust for header height */
        }

        .sidebar {
            background-color: #f3e9dd;
            padding-top: 20px;
        }

        .sidebar a {
            padding: 15px 10px;
            text-decoration: none;
            font-size: 18px;
            color: #818181;
            display: block;
        }

        .sidebar a:hover {
            color: #f1f1f1;
        }

        .content {
            padding: 16px;
            overflow-y: auto; /* Add scrollbar if content overflows */
        }

        .product-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .product-box {
            text-align: center;
            border: 1px solid #ddd;
            padding: 20px;
            margin-bottom: 20px;
        }

        .product-box img {
            max-height: 200px;
        }

        .product-image {
            max-width: 100%;
            height: auto;
        }

        .product-name {
            margin-top: 10px;
            font-weight: bold;
        }

        .stars {
            color: gold;
        }

        .price {
            margin-top: 10px;
            font-size: 18px;
        }

        .search-button {
            border: #413d3d solid 0.5px;
            border-radius: 9px;
            margin-left: 3px;
        }

        .search-button:hover {
            background-color: rgb(202, 194, 194);
        }

        .sidebar a:hover .dash {
            color: black;
        }

        .sidebar a:hover {
            color: black;
        }

        /* Customization and Delivery Section Styles */
        .customization-section {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            border: 1px solid #ddd;
            padding: 20px;
        }

        .customization-section div {
            text-align: center;
        }

        .customize-button,
        .delivery-button {
            padding: 10px;
            background-color: #f3e9dd;
            border: 1px solid #ddd;
            cursor: pointer;
        }

        .customize-button:hover,
        .delivery-button:hover {
            background-color: rgb(202, 194, 194);
        }
    </style>
</head>

<body>

    <section>
        <nav class="navbar bg-body-tertiary" style="background-color: #f3e9dd ; border-bottom: 0.1px solid;">
            <div class="container-fluid">
                <a class="navbar-brand">UpaharNepal</a>
                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
                    <button class="search-button" type="submit">Search</button>
                </form>
            </div>
        </nav>
    </section>
    <section>
        <div class="dashboard-container">
            <div class="sidebar">
                <a href="./home.html">
                    <i class="fas fa-home dash"></i> Home
                </a>
                <a href="./pricing.html">
                    <i class="fas fa-dollar-sign dash"></i> Pricing
                </a>
                <a href="./cart.html">
                    <i class="fas fa-shopping-cart dash"></i> Cart
                </a>
                <a href="./occasions.html">
                    <i class="fas fa-birthday-cake dash"></i> Occasions
                </a>
            </div>
                <div class="customization-section">
                    <div>
                        <h3>Customization Costs</h3>
                        <button class="customize-button">Customize</button>
                    </div>
                    <div>
                        <h3>Delivery Fees</h3>
                        <button class="delivery-button">Calculate</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
</body>

</html>
